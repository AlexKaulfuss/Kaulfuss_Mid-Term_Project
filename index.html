<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamonds and Destinies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!--beautiful title-->
        <h1 id="title">DIAMONDS & DESTINIES</h1>
        <!--Starting scene-->
        <div class="image-frame">
            <img id="story-image" src="entrance.jpg" alt="Scene">
        </div>
        <div id="text-box">
            <p id="p1"></p>
            <p id="p2"></p>
            <p id="p3"></p>
        </div>
        <div id="input-section" style="display:none;">
    <input type="text" id="user-input" placeholder="Enter password...">
    <button id="submit-input">Submit</button>
    </div>
    <!--Hover over image hint-->
    <div id="tooltip" style="position:absolute; visibility:hidden; background:gold; color:black; padding:5px; border-radius:5px;">Hide your tattoo!</div>
        <div id="controls">
            <!--Choices-->
            <button id="choice1" class="btn"></button>
            <button id="choice2" class="btn"></button>
            <button id="choice3" class="btn"></button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
